<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#FFF8F5"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="220" fill="#8B5E3C"/>
  <!-- Signal bars (left side - representing Signal) -->
  <rect x="140" y="300" width="28" height="60" rx="6" fill="#DCE8B4"/>
  <rect x="178" y="260" width="28" height="100" rx="6" fill="#DCE8B4"/>
  <rect x="216" y="210" width="28" height="150" rx="6" fill="#DCE8B4"/>
  <!-- Divider line -->
  <line x1="256" y1="180" x2="256" y2="370" stroke="#FFDCC2" stroke-width="3" stroke-dasharray="8,6"/>
  <!-- Noise bars (right side - smaller, representing Noise) -->
  <rect x="270" y="320" width="28" height="40" rx="6" fill="#FFDAD6" opacity="0.8"/>
  <rect x="308" y="340" width="28" height="20" rx="6" fill="#FFDAD6" opacity="0.6"/>
  <rect x="346" y="330" width="28" height="30" rx="6" fill="#FFDAD6" opacity="0.7"/>
  <!-- SNR text -->
  <text x="256" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="48" fill="#FFDCC2" letter-spacing="6">SNR</text>
  <!-- Bottom tagline -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="500" font-size="22" fill="#FFDCC2" opacity="0.7">COMMAND CENTER</text>
</svg>
